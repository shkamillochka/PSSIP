<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Адаптивка</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-auto-rows: minmax(100px, auto);
      gap: 10px;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .grid-item {
      border: 1px solid #ff0088;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      background-color: #ff0088;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .grid-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* Расположение элементов для desktop */
    .item1 { grid-column: 1 / 7; grid-row: 1; }
    .item2 { grid-column: 1 / 4; grid-row: 2; }
    .item3 { grid-column: 4 / 7; grid-row: 2; }
    .item4 { grid-column: 1 / 2; grid-row: 3; }
    .item5 { grid-column: 2 / 4; grid-row: 3; }
    .item6 { grid-column: 4 / 5; grid-row: 3; }
    .item7 { grid-column: 5 / 7; grid-row: 3 / 5; }
    .item8 { grid-column: 1 / 4; grid-row: 4; }
    .item9 { grid-column: 4 / 5; grid-row: 4; }
    .item10 { grid-column: 1 / 7; grid-row: 5; }

    /* Адаптация для планшетов (768px - 1024px) */
    @media (max-width: 1024px) {
      .grid-container {
        grid-template-columns: repeat(4, 1fr);
      }
      
      .item1 { grid-column: 1 / 5; }
      .item2 { grid-column: 1 / 3; }
      .item3 { grid-column: 3 / 5; }
      .item4 { grid-column: 1 / 2; }
      .item5 { grid-column: 2 / 4; }
      .item6 { grid-column: 4 / 5; }
      .item7 { grid-column: 1 / 3; grid-row: 4 / 6; }
      .item8 { grid-column: 3 / 5; grid-row: 4; }
      .item9 { grid-column: 3 / 4; grid-row: 5; }
      .item10 { grid-column: 1 / 5; grid-row: 6; }
      
      .grid-item {
        font-size: 20px;
      }
    }

    /* Адаптация для мобильных устройств (до 768px) */
    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      
      .item1, .item2, .item3, .item4, 
      .item5, .item6, .item7, .item8, 
      .item9, .item10 {
        grid-column: 1;
      }
      
      .item1 { grid-row: 1; }
      .item2 { grid-row: 2; }
      .item3 { grid-row: 3; }
      .item4 { grid-row: 4; }
      .item5 { grid-row: 5; }
      .item6 { grid-row: 6; }
      .item7 { grid-row: 7; height: auto; }
      .item8 { grid-row: 8; }
      .item9 { grid-row: 9; }
      .item10 { grid-row: 10; }
      
      .grid-item {
        font-size: 18px;
        min-height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="grid-container">
    <div class="grid-item item1">1</div>
    <div class="grid-item item2">2</div>
    <div class="grid-item item3">3</div>
    <div class="grid-item item4">4</div>
    <div class="grid-item item5">5</div>
    <div class="grid-item item6">6</div>
    <div class="grid-item item7">7</div>
    <div class="grid-item item8">8</div>
    <div class="grid-item item9">9</div>
    <div class="grid-item item10">10</div>
  </div>
</body>
</html>
