<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Работа с массивами</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #ff00bb;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #ff00e6;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f8ff;
            border-radius: 5px;
            display: none;
        }
        .error {
            color: red;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <h2>Работа с массивами</h2>
    <p>Введите 5 целых чисел:</p>
    
    <div class="form-group">
        <label for="num1">Элемент 1:</label>
        <input type="number" id="num1" required>
    </div>
    
    <div class="form-group">
        <label for="num2">Элемент 2:</label>
        <input type="number" id="num2" required>
    </div>
    
    <div class="form-group">
        <label for="num3">Элемент 3:</label>
        <input type="number" id="num3" required>
    </div>
    
    <div class="form-group">
        <label for="num4">Элемент 4:</label>
        <input type="number" id="num4" required>
    </div>
    
    <div class="form-group">
        <label for="num5">Элемент 5:</label>
        <input type="number" id="num5" required>
    </div>
    
    <div class="error" id="error"></div>
    
    <button onclick="processArray()">Обработать массив</button>
    
    <div class="result" id="result">
        <h3>Результаты:</h3>
        <p><strong>Исходный массив:</strong> <span id="original"></span></p>
        <p><strong>Сумма положительных элементов:</strong> <span id="sum"></span></p>
        <p><strong>Отсортированный массив:</strong> <span id="sorted"></span></p>
    </div>

    <script>
        function processArray() {
            // Получаем значения из полей ввода
            const num1 = parseInt(document.getElementById('num1').value);
            const num2 = parseInt(document.getElementById('num2').value);
            const num3 = parseInt(document.getElementById('num3').value);
            const num4 = parseInt(document.getElementById('num4').value);
            const num5 = parseInt(document.getElementById('num5').value);
            
            // Проверяем, что все поля заполнены
            if (isNaN(num1) || isNaN(num2) || isNaN(num3) || isNaN(num4) || isNaN(num5)) {
                document.getElementById('error').textContent = 'Пожалуйста, заполните все поля числами';
                document.getElementById('error').style.display = 'block';
                return;
            }
            
            // Скрываем сообщение об ошибке, если оно было показано
            document.getElementById('error').style.display = 'none';
            
            // Создаем массив
            const numbers = [num1, num2, num3, num4, num5];
            
            // Находим сумму положительных элементов
            let sumPositives = 0;
            for (let num of numbers) {
                if (num > 0) {
                    sumPositives += num;
                }
            }
            
            // Сортируем массив (создаем копию, чтобы не изменять исходный)
            const sortedNumbers = [...numbers].sort((a, b) => a - b);
            
            // Выводим результаты
            document.getElementById('original').textContent = '[' + numbers.join(', ') + ']';
            document.getElementById('sum').textContent = sumPositives;
            document.getElementById('sorted').textContent = '[' + sortedNumbers.join(', ') + ']';
            
            // Показываем блок с результатами
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
