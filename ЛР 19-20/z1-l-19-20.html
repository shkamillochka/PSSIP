<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidsstory — Детский сад и клуб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #fef9f0;
            color: #2a3b2e;
        }

        /* Шапка */
        .header {
            background: #ffffffd9;
            backdrop-filter: blur(8px);
            box-shadow: 0 6px 14px rgba(0,40,20,0.06);
            padding: 1.2rem 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f3d9c6;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(130deg, #4a785e, #d49b6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cart-icon {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #fae8dd;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #dbb99a;
        }

        .cart-icon:hover {
            background: #f5dac8;
            transform: scale(1.02);
        }

        .cart-count {
            background: #a9c9b0;
            color: #1e422b;
            border-radius: 30px;
            padding: 0.15rem 0.7rem;
            font-size: 0.9rem;
            font-weight: 700;
        }

        /* Контейнер */
        .container {
            max-width: 1300px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }

        h2 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            border-left: 7px solid #c9a87c;
            padding-left: 1.2rem;
            margin-bottom: 2.5rem;
            color: #3f5e49;
        }

        /* Каталог — сетка */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem 1.8rem;
            margin-bottom: 4rem;
        }

        .product-card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1.2rem 1.8rem;
            box-shadow: 0 18px 28px -14px rgba(90, 70, 40, 0.15);
            transition: 0.25s ease;
            border: 1px solid #f0ded0;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 35px -12px #8b6f5080;
            border-color: #c9b2a0;
        }

        .product-icon {
            font-size: 3rem;
            background: #faf0e9;
            width: 65px;
            height: 65px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            border: 2px solid #d5bcac;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #3c543e;
            margin-bottom: 0.3rem;
        }

        .product-desc {
            color: #68665e;
            font-size: 0.85rem;
            line-height: 1.5;
            margin: 0.5rem 0 0.8rem;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            border-top: 2px dotted #ddcbbc;
            padding-top: 1rem;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #70543e;
        }

        .price small {
            font-size: 0.8rem;
            font-weight: 400;
            color: #9b8a7a;
        }

        .add-to-cart {
            background: #bdd9c2;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            color: #1f412b;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #7fa386;
            font-size: 0.85rem;
        }

        .add-to-cart:hover {
            background: #a3c0aa;
            transform: scale(0.97);
        }

        /* Корзина (боковая панель) */
        .cart-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            height: 100vh;
            background: #fffcf5;
            box-shadow: -8px 0 25px #402e1e1a;
            border-left: 2px solid #ddc3b0;
            padding: 2rem 1.8rem;
            transform: translateX(100%);
            transition: 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
        }

        .cart-overlay.open {
            transform: translateX(0);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .cart-header h3 {
            font-size: 1.8rem;
            font-weight: 300;
            color: #594d3e;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #987b64;
            line-height: 1;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fef7f0;
            padding: 0.8rem 1rem;
            border-radius: 22px;
            border: 1px solid #e2cfc0;
        }

        .cart-item-info h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            color: #415e44;
        }

        .cart-item-info p {
            font-size: 0.9rem;
            color: #776b60;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .cart-item-actions button {
            background: #e9dbd1;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            color: #3d3d35;
            border: 1px solid #bbaa9a;
        }

        .cart-item-actions span {
            font-weight: 700;
            min-width: 22px;
            text-align: center;
        }

        .cart-total {
            font-size: 1.6rem;
            font-weight: 600;
            color: #60442e;
            border-top: 3px solid #d6bcac;
            padding-top: 1.5rem;
            text-align: right;
        }

        .clear-cart {
            background: #f0ded2;
            border: 2px solid #b6805c;
            color: #5a3e2b;
            padding: 0.9rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.2s;
            font-size: 1rem;
        }

        .clear-cart:hover {
            background: #e3c9b8;
        }

        .empty-cart-msg {
            color: #ad9b8c;
            text-align: center;
            margin-top: 3rem;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="header">
    <span class="logo">🌿 Kidsstory · английский клуб</span>
    <div class="cart-icon" onclick="toggleCart()">
        <span>🛒 Корзина</span>
        <span class="cart-count" id="cartCounter">0</span>
    </div>
</div>

<!-- Каталог -->
<div class="container">
    <h2>📚 Занятия и услуги</h2>
    <div class="catalog-grid" id="catalogContainer"></div>
</div>

<!-- Боковая корзина -->
<div class="cart-overlay" id="cartSidebar">
    <div class="cart-header">
        <h3>🍎 Корзина</h3>
        <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItemsContainer"></div>
    <div class="cart-total" id="cartTotal">0 ₽</div>
    <button class="clear-cart" onclick="clearCart()">🧹 Очистить корзину</button>
</div>

<script>
    // --- JSON данные (имитация загрузки из JSON-файла) ---
    const CATALOG_JSON = {
        "services": [
            {
                "id": 1,
                "name": "Английский для малышей (2-3 года)",
                "description": "Игровые занятия с носителем, песенки, жесты, погружение в среду.",
                "price": 3800,
                "icon": "🧸",
                "duration": "45 мин"
            },
            {
                "id": 2,
                "name": "Pre-school (3-5 лет)",
                "description": "Подготовка к школе на английском: счёт, буквы, творчество.",
                "price": 5200,
                "icon": "🎨",
                "duration": "60 мин"
            },
            {
                "id": 3,
                "name": "Детский сад (полдня, англ. среда)",
                "description": "Пребывание 4 часа, полное погружение, опытные педагоги.",
                "price": 12500,
                "icon": "🏫",
                "duration": "4 часа"
            },
            {
                "id": 4,
                "name": "Детский сад (полный день)",
                "description": "8:30–18:30, питание, сон, развитие, английский круглосуточно.",
                "price": 22500,
                "icon": "⭐",
                "duration": "10 часов"
            },
            {
                "id": 5,
                "name": "Разговорный клуб (5-7 лет)",
                "description": "Общение, игры, театр, проекты — свободный английский.",
                "price": 4600,
                "icon": "🗣️",
                "duration": "1.5 часа"
            },
            {
                "id": 6,
                "name": "Подготовка к школе (билингвы)",
                "description": "Математика, чтение, письмо на русском и английском.",
                "price": 5900,
                "icon": "📖",
                "duration": "90 мин"
            },
            {
                "id": 7,
                "name": "Логопед-английский",
                "description": "Коррекция речи + английская фонетика (индивидуально).",
                "price": 3200,
                "icon": "🦷",
                "duration": "45 мин"
            },
            {
                "id": 8,
                "name": "Творческая мастерская (англ.)",
                "description": "Рисование, лепка, поделки — всё на английском.",
                "price": 2900,
                "icon": "🖌️",
                "duration": "1 час"
            },
            {
                "id": 9,
                "name": "Music & Movement",
                "description": "Музыкальные занятия, танцы, ритмика на английском.",
                "price": 2700,
                "icon": "🎵",
                "duration": "50 мин"
            },
            {
                "id": 10,
                "name": "Weekend club (сб/вс)",
                "description": "Субботний клуб общения, экскурсии, квесты на английском.",
                "price": 3500,
                "icon": "🧩",
                "duration": "3 часа"
            },
            {
                "id": 11,
                "name": "Индивидуальные уроки (Skype/очно)",
                "description": "Персональная программа с преподавателем.",
                "price": 2200,
                "icon": "👩‍🏫",
                "duration": "60 мин"
            },
            {
                "id": 12,
                "name": "Клуб юных блогеров (англ.)",
                "description": "Снимаем видео, пишем тексты, учим язык современно.",
                "price": 4300,
                "icon": "📱",
                "duration": "2 часа"
            }
        ]
    };

    // --- Состояние корзины (храним в объекте id → количество) ---
    let cart = JSON.parse(localStorage.getItem('kidsstory_cart')) || {};

    // Элементы DOM
    const catalogEl = document.getElementById('catalogContainer');
    const cartItemsEl = document.getElementById('cartItemsContainer');
    const cartTotalEl = document.getElementById('cartTotal');
    const cartCounter = document.getElementById('cartCounter');
    const cartSidebar = document.getElementById('cartSidebar');

    // --- Рендер каталога из JSON ---
    function renderCatalog() {
        const services = CATALOG_JSON.services;
        catalogEl.innerHTML = services.map(service => `
            <div class="product-card">
                <div class="product-icon">${service.icon}</div>
                <div class="product-title">${service.name}</div>
                <div class="product-desc">${service.description} (${service.duration})</div>
                <div class="product-footer">
                    <span class="price">${service.price} <small>₽</small></span>
                    <button class="add-to-cart" onclick="addToCart(${service.id})">➕ В корзину</button>
                </div>
            </div>
        `).join('');
    }

    // --- Добавить в корзину ---
    window.addToCart = function(id) {
        if (cart[id]) {
            cart[id] += 1;
        } else {
            cart[id] = 1;
        }
        saveCart();
        renderCart();
        showCartNotification();
    };

    // --- Изменить количество (+ / -) ---
    window.updateQty = function(id, delta) {
        if (!cart[id] && delta === 1) {
            cart[id] = 1;
        } else if (cart[id]) {
            cart[id] += delta;
            if (cart[id] <= 0) {
                delete cart[id];
            }
        }
        saveCart();
        renderCart();
    };

    // --- Удалить позицию полностью ---
    window.removeItem = function(id) {
        delete cart[id];
        saveCart();
        renderCart();
    };

    // --- Очистить всю корзину ---
    window.clearCart = function() {
        cart = {};
        saveCart();
        renderCart();
    };

    // --- Сохранить в localStorage (имитация постоянства) ---
    function saveCart() {
        localStorage.setItem('kidsstory_cart', JSON.stringify(cart));
        updateCartCounter();
    }

    // --- Обновить счётчик в шапке ---
    function updateCartCounter() {
        const totalItems = Object.values(cart).reduce((acc, qty) => acc + qty, 0);
        cartCounter.textContent = totalItems;
    }

    // --- Отрисовка корзины ---
    function renderCart() {
        const services = CATALOG_JSON.services;
        const cartEntries = Object.entries(cart);

        if (cartEntries.length === 0) {
            cartItemsEl.innerHTML = '<div class="empty-cart-msg">✨ Корзина пуста, выберите занятия</div>';
            cartTotalEl.textContent = '0 ₽';
            updateCartCounter();
            return;
        }

        let itemsHtml = '';
        let total = 0;

        cartEntries.forEach(([idStr, qty]) => {
            const id = Number(idStr);
            const service = services.find(s => s.id === id);
            if (!service) return;
            const itemTotal = service.price * qty;
            total += itemTotal;

            itemsHtml += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${service.icon} ${service.name}</h4>
                        <p>${service.price} ₽ × ${qty} = ${itemTotal} ₽</p>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="updateQty(${id}, -1)">−</button>
                        <span>${qty}</span>
                        <button onclick="updateQty(${id}, 1)">+</button>
                        <button style="background:#eec9b9; width:auto; padding:0 12px;" onclick="removeItem(${id})">✕</button>
                    </div>
                </div>
            `;
        });

        cartItemsEl.innerHTML = itemsHtml;
        cartTotalEl.textContent = `${total} ₽`;
        updateCartCounter();
    }

    // --- Всплывающее уведомление (имитация) ---
    function showCartNotification() {
        // короткое уведомление можно добавить при желании
        if (!cartSidebar.classList.contains('open')) {
            toggleCart(); // автоматически открыть корзину при добавлении
        }
    }

    // --- Открыть/закрыть боковую корзину ---
    window.toggleCart = function() {
        cartSidebar.classList.toggle('open');
    };

    // --- Закрытие по клику вне корзины (простое) ---
    document.addEventListener('click', (e) => {
        if (!cartSidebar.contains(e.target) && !e.target.closest('.cart-icon')) {
            cartSidebar.classList.remove('open');
        }
    });

    // --- Инициализация ---
    renderCatalog();
    renderCart();

    // Дополнительно: если хотим имитировать загрузку из внешнего JSON (настоящего)
    // можно использовать fetch, но здесь данные уже встроены.
    console.log('Kidsstory каталог загружен, данные из JSON:', CATALOG_JSON);
</script>


</body>
</html>
