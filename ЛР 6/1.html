<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Фиксированная сетка</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background-color: #f5f5f5;
      overflow-x: auto; /* Добавляем горизонтальный скролл при необходимости */
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(6, 100px); /* Фиксированные колонки */
      grid-auto-rows: 100px; /* Фиксированные строки */
      gap: 10px;
      width: 640px; /* 6 колонок по 100px + 5 gaps по 10px (6*100 + 5*10 = 650px) */
      margin: 0 auto;
    }

    .grid-item {
      border: 1px solid #ff0088;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      background-color: #ff0088;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }

    .grid-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* Расположение элементов */
    .item1 { grid-column: 1 / 7; grid-row: 1; }
    .item2 { grid-column: 1 / 4; grid-row: 2; }
    .item3 { grid-column: 4 / 7; grid-row: 2; }
    .item4 { grid-column: 1 / 2; grid-row: 3; }
    .item5 { grid-column: 2 / 4; grid-row: 3; }
    .item6 { grid-column: 4 / 5; grid-row: 3; }
    .item7 { grid-column: 5 / 7; grid-row: 3 / 5; height: 210px; } /* 2 строки по 100px + 1 gap 10px */
    .item8 { grid-column: 1 / 4; grid-row: 4; }
    .item9 { grid-column: 4 / 5; grid-row: 4; }
    .item10 { grid-column: 1 / 7; grid-row: 5; }
  </style>
</head>
<body>
  <div class="grid-container">
    <div class="grid-item item1">1</div>
    <div class="grid-item item2">2</div>
    <div class="grid-item item3">3</div>
    <div class="grid-item item4">4</div>
    <div class="grid-item item5">5</div>
    <div class="grid-item item6">6</div>
    <div class="grid-item item7">7</div>
    <div class="grid-item item8">8</div>
    <div class="grid-item item9">9</div>
    <div class="grid-item item10">10</div>
  </div>
</body>
</html>
