<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grid Layout</title>
  <style>
    .grid-container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 100px);
      gap: 2px;
      border: 2px solid black;
    }

    .grid-item {
      border: 1px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }

    .item1 { 
      grid-column: 1 / 7; 
      grid-row: 1 / 2; 
      background-color: #ff0088; /* Light Pink */
    }
    .item2 { 
      grid-column: 1 / 4; 
      grid-row: 2 / 3; 
      background-color: #ff0088; /* Hot Pink */
    }
    .item3 { 
      grid-column: 4 / 7; 
      grid-row: 2 / 3; 
      background-color: #ff0088; /* Deep Pink */
    }
    .item4 { 
      grid-column: 1 / 2; 
      grid-row: 3 / 4; 
      background-color: #ff0088; /* Pale Violet Red */
    }
    .item5 { 
      grid-column: 2 / 4; 
      grid-row: 3 / 4; 
      background-color: #ff0088; /* Medium Violet Red */
    }
    .item6 { 
      grid-column: 4 / 5; 
      grid-row: 3 / 4; 
      background-color: #ff0088; /* Pink */
    }
    .item7 { 
      grid-column: 5 / 7; 
      grid-row: 3 / 5; 
      background-color: #ff0088; /* Light Pink 2 */
    }
    .item8 { 
      grid-column: 1 / 4; 
      grid-row: 4 / 5; 
      background-color: #ff0088; /* Deep Pink 2 */
    }
    .item9 { 
      grid-column: 4 / 5; 
      grid-row: 4 / 5; 
      background-color: #ff0088; /* Pink 3 */
    }
    .item10 { 
      grid-column: 1 / 7; 
      grid-row: 5 / 6; 
      background-color: #ff0088; /* Maroon */
    }
  </style>
</head>
<body>
  <div class="grid-container">
    <div class="grid-item item1">1</div>
    <div class="grid-item item2">2</div>
    <div class="grid-item item3">3</div>
    <div class="grid-item item4">4</div>
    <div class="grid-item item5">5</div>
    <div class="grid-item item6">6</div>
    <div class="grid-item item7">7</div>
    <div class="grid-item item8">8</div>
    <div class="grid-item item9">9</div>
    <div class="grid-item item10">10</div>
  </div>
</body>
</html>
