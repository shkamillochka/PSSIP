<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список имен</title>
    <style>
        #nameList {
            display: block; /* Изначально список виден */
            margin-top: 10px;
        }
        .hidden {
            display: none; /* Класс для скрытия списка */
        }
        button {
            cursor: pointer;
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        p {
            margin: 5px 0;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <button onclick="toggleList()">Свернуть/Развернуть список</button>
    <div id="nameList"></div>

    <script>
        // Заполняем список именами при загрузке страницы
        window.onload = function() {
            const nameList = document.getElementById('nameList');
            
            // Генерируем 24 элемента с именем
            for (let i = 1; i <= 24; i++) {
                const nameElement = document.createElement('p');
                nameElement.textContent = `${i}. Шикута Камилла`;
                nameList.appendChild(nameElement);
            }
        };

        // Функция переключения видимости списка
        function toggleList() {
            const list = document.getElementById('nameList');
            list.classList.toggle('hidden');
        }
    </script>
</body>
</html>
