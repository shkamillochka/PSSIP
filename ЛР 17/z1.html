<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>События мыши</title>
    <style>
        .mouse-events {
            padding: 20px;
            margin: 20px;
            border: 2px solid #3498db;
            border-radius: 10px;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }
        
        .mouse-box {
            width: 200px;
            height: 150px;
            background-color: #e74c3c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        
        .event-log {
            margin-top: 20px;
            padding: 15px;
            background-color: #2c3e50;
            color: white;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="mouse-events">
        <h2>События мыши</h2>
        
        <div class="mouse-box" id="mouseDemo">
            Наведи, кликни, двойной клик
        </div>
        
        <div class="event-log" id="mouseLog">
            Журнал событий:
        </div>
    </div>

    <script>
        const mouseBox = document.getElementById('mouseDemo');
        const mouseLog = document.getElementById('mouseLog');
        
        // Клик
        mouseBox.addEventListener('click', function(e) {
            addLog('Клик: ' + e.button + ' кнопка');
            this.style.backgroundColor = '#27ae60';
        });
        
        // Двойной клик
        mouseBox.addEventListener('dblclick', function() {
            addLog('Двойной клик');
            this.style.backgroundColor = '#f39c12';
        });
        
        // Наведение
        mouseBox.addEventListener('mouseenter', function() {
            addLog('Мышь над элементом');
            this.style.transform = 'scale(1.05)';
        });
        
        // Уход мыши
        mouseBox.addEventListener('mouseleave', function() {
            addLog('Мышь покинула элемент');
            this.style.transform = 'scale(1)';
            this.style.backgroundColor = '#e74c3c';
        });
        
        // Движение мыши
        mouseBox.addEventListener('mousemove', function(e) {
            const x = e.offsetX;
            const y = e.offsetY;
            this.textContent = `X: ${x}, Y: ${y}`;
        });
        
        // Контекстное меню (правый клик)
        mouseBox.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            addLog('Правый клик - контекстное меню');
            this.style.backgroundColor = '#9b59b6';
        });
        
        function addLog(message) {
            const logEntry = document.createElement('div');
            logEntry.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            mouseLog.appendChild(logEntry);
            mouseLog.scrollTop = mouseLog.scrollHeight;
        }
    </script>
</body>
</html>
