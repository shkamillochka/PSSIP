<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Events</title>
    <style>
        .timer-container {
            padding: 20px;
            margin: 20px;
            border: 2px solid #e84393;
            border-radius: 10px;
            background: #f8f9fa;
        }
        .timer-display {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            background: #2d3436;
            color: #00cec9;
            border-radius: 10px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }
        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .timer-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .start-btn { background: #00b894; color: white; }
        .pause-btn { background: #fdcb6e; color: #2d3436; }
        .reset-btn { background: #e17055; color: white; }
        .interval-btn { background: #6c5ce7; color: white; }
        
        .timer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .animation-box {
            width: 100px;
            height: 100px;
            background: #6c5ce7;
            margin: 20px auto;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .timer-info {
            padding: 15px;
            background: #636e72;
            color: white;
            border-radius: 8px;
            margin-top: 20px;
        }
        .progress-container {
            width: 100%;
            height: 20px;
            background: #dfe6e9;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fd79a8, #e84393);
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div class="timer-container">
        <h2>7. События таймера</h2>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="timer-controls">
            <button class="timer-btn start-btn" id="startBtn">Старт</button>
            <button class="timer-btn pause-btn" id="pauseBtn">Пауза</button>
            <button class="timer-btn reset-btn" id="resetBtn">Сброс</button>
            <button class="timer-btn interval-btn" id="intervalBtn">Интервал</button>
        </div>
        
        <div class="animation-box" id="animationBox">Анимация</div>
        <div class="timer-info" id="timerInfo">
            Статус: Остановлено
            Интервалы: 0
            Таймауты: 0
        </div>
    </div>

    <script>
        const timerDisplay = document.getElementById('timerDisplay');
        const progressBar = document.getElementById('progressBar');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const intervalBtn = document.getElementById('intervalBtn');
        const animationBox = document.getElementById('animationBox');
        const timerInfo = document.getElementById('timerInfo');

        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let intervalCount = 0;
        let timeoutCount = 0;
        let currentInterval = null;

        function formatTime(ms) {
            const hours = Math.floor(ms / 3600000);
            const minutes = Math.floor((ms % 3600000) / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTimer, 10);
                isRunning = true;
                startAnimation();
                updateTimerInfo();
            }
        }

        function updateTimer() {
            const currentTime = Date.now();
            elapsedTime = currentTime - startTime;
            timerDisplay.textContent = formatTime(elapsedTime);
            
            const progress = (elapsedTime % 10000) / 10000 * 100;
            progressBar.style.width = progress + '%';
        }

        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                pauseAnimation();
                updateTimerInfo();
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            if (currentInterval) clearInterval(currentInterval);
            elapsedTime = 0;
            intervalCount = 0;
            timeoutCount = 0;
            timerDisplay.textContent = '00:00:00';
            isRunning = false;
            progressBar.style.width = '0%';
            resetAnimation();
            updateTimerInfo();
        }

        function startIntervalDemo() {
            if (currentInterval) clearInterval(currentInterval);
            
            currentInterval = setInterval(() => {
                intervalCount++;
                animationBox.style.background = getRandomColor();
                animationBox.style.transform = `scale(${1 + Math.random() * 0.5})`;
                updateTimerInfo();
            }, 1000);

            // Демо setTimeout
            setTimeout(() => {
                timeoutCount++;
                animationBox.style.border = '3px solid #f1c40f';
                updateTimerInfo();
                
                setTimeout(() => {
                    animationBox.style.border = 'none';
                }, 500);
            }, 3000);
        }

        function startAnimation() {
            let angle = 0;
            const animationInterval = setInterval(() => {
                if (!isRunning) {
                    clearInterval(animationInterval);
                    return;
                }
                angle += 2;
                animationBox.style.transform = `rotate(${angle}deg) scale(1.1)`;
            }, 20);
        }

        function pauseAnimation() {
            animationBox.style.transform = 'scale(1)';
        }

        function resetAnimation() {
            animationBox.style.transform = 'scale(1)';
            animationBox.style.background = '#6c5ce7';
            animationBox.style.border = 'none';
        }

        function getRandomColor() {
            return `hsl(${Math.random() * 360}, 70%, 60%)`;
        }

        function updateTimerInfo() {
            timerInfo.innerHTML = `
                Статус: ${isRunning ? 'Запущено' : 'Остановлено'}
                Прошло: ${formatTime(elapsedTime)}
                Интервалов: ${intervalCount}
                Таймаутов: ${timeoutCount}
            `;
        }

        // Обработчики событий
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        intervalBtn.addEventListener('click', startIntervalDemo);

        // RequestAnimationFrame демо
        function animate() {
            const now = Date.now();
            const hue = (now / 10) % 360;
            timerDisplay.style.color = `hsl(${hue}, 100%, 50%)`;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
